name: 질문 / 논의
description: 아키텍처·설계 관련 기록이 필요한 질문
title: '[question] '
labels: ['question']
body:
  - type: textarea
    id: context
    attributes:
      label: 배경
      description: 왜 이 질문이 생겼는지
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: 질문
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: 고려한 선택지
      placeholder: |
        1. 안 A — 장점/단점
        2. 안 B — 장점/단점
