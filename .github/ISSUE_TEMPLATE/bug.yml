name: Bug
description: Something is broken.
title: '[bug] '
labels: ['bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce.
      placeholder: |
        1. Run `pnpm --filter @momentlog/domain test`
        2. Observe failure in `vlog/state.test.ts`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: Runtime, OS, pnpm/node/deno versions.
      placeholder: 'macOS 14.4, Node 20.11, pnpm 9.12, iOS 18 simulator'
